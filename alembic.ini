# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration file
# The DATABASE_URL is read from the environment in src/db/migrations/env.py.
# This file just tells Alembic where to find the migration scripts.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to the migration scripts
script_location = src/db/migrations

# Naming convention for auto-generated migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# Truncate the message used in slug to this many characters
truncate_slug_length = 40

# -- The actual URL is set dynamically in env.py via DATABASE_URL env var --
# sqlalchemy.url = set by env.py

[post_write_hooks]
# Run black on newly generated migration files
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
